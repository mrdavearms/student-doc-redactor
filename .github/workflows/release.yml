name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # Required to create GitHub Releases and upload assets

jobs:

  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Tesseract (required by bundle script)
        run: brew install tesseract

      - name: Bundle Python + Tesseract (Mac)
        run: bash scripts/bundle-python-mac.sh

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and publish (Mac)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --mac --publish always

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Tesseract (required by bundle script)
        run: choco install tesseract -y --no-progress

      - name: Bundle Python + Tesseract (Windows)
        shell: pwsh
        run: pwsh -File scripts/bundle-python-win.ps1

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build and publish (Windows)
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run build
          npx electron-builder --win --publish always
